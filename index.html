<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Coastal Asset Solutions Ltd</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family: Arial, sans-serif; margin:0; background:#f6f7f9; color:#111;">

<div style="max-width: 900px; margin: 40px auto; background:white; padding:40px; border-radius:10px;">

  <h1>Coastal Asset Solutions Ltd</h1>

  <p style="font-size:18px; color:#444;">
    Independent Coastal Property Assessments for Long-Term Asset Protection
  </p>

  <hr>

  <h2>Request an Assessment</h2>

  <p>
    Fill in the form below. It will generate a ready-to-send email in your browser (no mail app required).
  </p>

  <form onsubmit="sendEmail(event)" style="display:flex; flex-direction:column; gap:10px;">

    <input id="name" type="text" placeholder="Your Name" required style="padding:10px;">
    <input id="email" type="email" placeholder="Your Email" required style="padding:10px;">
    <input id="location" type="text" placeholder="Property Location" required style="padding:10px;">
    <textarea id="message" rows="5" placeholder="Brief description of your property" required style="padding:10px;"></textarea>

    <button type="submit" style="padding:12px; background:#111; color:white; border:none; cursor:pointer;">
      Generate Request Email
    </button>

  </form>

  <h2>Contact</h2>
  <p>info@coastalassetsolutions.co.nz</p>

</div>

<script>
function sendEmail(e) {
  e.preventDefault();

  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  const location = document.getElementById('location').value;
  const message = document.getElementById('message').value;

  const body =
`Coastal Asset Assessment Request

Name: ${name}
Email: ${email}
Location: ${location}

Message:
${message}`;

  // Opens web email composer instead of system mail client
  const url =
`https://mail.google.com/mail/?view=cm&fs=1&to=info@coastalassetsolutions.co.nz&su=Coastal%20Asset%20Assessment%20Request&body=${encodeURIComponent(body)}`;

  window.open(url, "_blank");
}
</script>

</body>
</html>
